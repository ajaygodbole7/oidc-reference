server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: oidc-reference-resource-server
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8080/realms/oidc-reference}

app:
  audience: ${OIDC_AUDIENCE:oidc-reference-api}
  roles-claim-path: ${OIDC_ROLES_CLAIM_PATH:realm_access,roles}
  # Service-account client ids are deployment topology, not a per-provider OIDC
  # value (Okta/Auth0/Entra assign client ids you don't choose). Defaults are
  # the local Keycloak client names. service-client-ids is the allowlist that
  # is denied on /api/me (user identity required); jobs-client-id is the single
  # service client authorized to POST /api/jobs.
  service-client-ids: ${RS_SERVICE_CLIENT_IDS:oidc-reference-api-gateway,oidc-reference-service}
  jobs-client-id: ${RS_JOBS_CLIENT_ID:oidc-reference-service}
  step-up:
    # Max age of the caller's last interactive authentication (the access
    # token's auth_time) accepted on a sensitive route (POST /api/admin). An
    # older — or absent — auth_time yields an RFC 9470
    # "insufficient_user_authentication" challenge; the SPA then elevates via
    # the BFF's /auth/step-up (a fresh re-auth), and the rotated access token
    # carries a fresh auth_time that satisfies this gate on retry.
    max-age: ${STEP_UP_MAX_AGE:300s}

# Actuator is bound to loopback on a dedicated management port (9082, not
# host-published). NOTE: a user-defined SecurityFilterChain (SecurityConfig)
# governs this port too — Boot does NOT give actuator its own chain once that
# bean exists — so authorization for these endpoints is decided there:
# /actuator/health (+ liveness/readiness probes) is permitted for the health
# probe; metrics/prometheus/info require auth (anyRequest().denyAll()). Only
# non-sensitive endpoints are exposed (no env/heapdump/loggers/threaddump/
# beans/configprops), and health detail is gated behind "when-authorized" so
# the anonymous /actuator/health response stays a terse UP/DOWN.
management:
  server:
    port: ${MANAGEMENT_PORT:9082}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: false

logging:
  # Boot 4 native structured logging. The logback-spring.xml profile blocks
  # switch this to a human-readable pattern in `dev` and ECS JSON otherwise.
  structured:
    format:
      console: ecs
  level:
    org.springframework.security: INFO
